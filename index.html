<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Health Survey With Skip Logic</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      background: #f7f7f7;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      margin: 12px 0;
    }

    input, select, button {
      font-size: 16px;
      padding: 10px;
      margin-top: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 20px;
    }

    pre {
      background: #eee;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .dob-selects {
      display: flex;
      gap: 10px;
    }

    .dob-selects select {
      width: auto;
      flex: 1;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Health Survey</h1>

    <div id="question-container"></div>

    <button id="next-btn">Next</button>

    <div id="summary-container"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
